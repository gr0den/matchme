services:

  redis:
    image: redis:alpine
    container_name: matchme-redis
    ports:
      - "6379:6379"
    networks:
      - matchme-network

  db:
    image: postgis/postgis:17-3.5
    container_name: matchme-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: matchme_db
    networks:
      - matchme-network

  backend:
    build: ./backend
    container_name: matchme-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/matchme_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - db
    networks:
      - matchme-network

  frontend:
    build:
      context: ./frontend
    container_name: matchme-frontend
    depends_on:
      - backend
    networks:
      - matchme-network

networks:
  matchme-network:
    driver: bridge