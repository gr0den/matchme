services:

  db:
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    ports:
      - "8080:8080"

  frontend:
    build:
      target: dev
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: